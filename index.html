<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saad Universe Mobile Optimized</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #020205; --accent: #00f2ff; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .hidden { display: none !important; }

        /* SPLASH SCREEN ORIGINAL ANIMATION */
        #splash-screen {
            position: fixed; inset: 0; background: black; z-index: 10000;
            display: flex; justify-content: center; align-items: center; transition: 1s;
        }
        .logo-anim { 
            width: 180px; height: 180px; border-radius: 50%; 
            object-fit: cover; opacity: 0; transform: scale(0.8); 
            transition: 0.8s; position: absolute; border: 1px solid var(--accent);
        }
        .logo-anim.active { opacity: 1; transform: scale(1); }

        /* NAV & SIDEBAR */
        nav { 
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(2,2,5,0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 25px; z-index: 1000; border-bottom: 0.5px solid rgba(0,242,255,0.2);
            box-sizing: border-box;
        }
        .side-menu {
            position: fixed; top: 0; right: -320px; width: 300px; height: 100vh; 
            background: rgba(5, 5, 15, 0.98); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            z-index: 5000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 100px 20px; box-sizing: border-box; border-left: 0.5px solid rgba(0,242,255,0.3);
            display: flex; flex-direction: column; gap: 15px;
        }
        .side-menu.active { right: 0; }
        .menu-item {
            display: flex; align-items: center; gap: 15px; width: 100%;
            background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.1);
            color: white; text-align: left; padding: 15px; cursor: pointer;
            border-radius: 12px; transition: 0.3s;
        }

        /* GRID SYSTEM: 1 BARIS 2 FOTO */
        .container { padding: 100px 15px 50px; text-align: center; min-height: 100vh; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            max-width: 1200px; margin: 0 auto; 
        }
        
        /* ORIGINAL REVEAL ANIMATION */
        .card-item, .member-card { 
            position: relative; border-radius: 15px; overflow: hidden; 
            aspect-ratio: 1/1; cursor: pointer; border: 0.5px solid rgba(255,255,255,0.1);
            opacity: 0; transform: translateY(30px); transition: 0.6s;
        }
        .card-item.reveal, .member-card.reveal { opacity: 1; transform: translateY(0); }
        .card-item img { width: 100%; height: 100%; object-fit: cover; }

        /* PHOTO ACTIONS */
        .photo-actions { position: absolute; top: 10px; right: 10px; display: flex; flex-direction: column; gap: 8px; opacity: 0; transition: 0.3s; z-index: 10; }
        .card-item:hover .photo-actions { opacity: 1; }
        .btn-float { width: 35px; height: 35px; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 0.5px solid rgba(255,255,255,0.2); }
        .btn-float.active { color: #ff4d4d; }

        /* OVERLAYS WITH STRONG BLUR */
        .full-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            display: flex; justify-content: center; align-items: center; z-index: 9000; 
            opacity: 0; pointer-events: none; transition: 0.4s;
        }
        .full-overlay.active { opacity: 1; pointer-events: auto; }
        #lightbox-img { max-width: 90%; max-height: 75vh; border-radius: 15px; object-fit: contain; border: 0.5px solid var(--accent); transform: scale(0.6); transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .full-overlay.active #lightbox-img { transform: scale(1); }

        .popup-card { background: #0a0a0f; padding: 30px; border-radius: 25px; border: 0.5px solid var(--accent); text-align: center; width: 80%; max-width: 320px; }

        /* MEMBER UI */
        .member-circle { width: 100%; aspect-ratio: 1/1; border-radius: 50%; border: 1px solid var(--accent); overflow: hidden; background: #111; margin-bottom: 10px; }
        .member-circle img { width: 100%; height: 100%; object-fit: cover; }

        /* SOCIAL BOX */
        .social-box { margin-top: 50px; padding: 25px; background: rgba(0,242,255,0.03); border-radius: 20px; border: 0.5px solid rgba(0,242,255,0.2); }
        .social-btn { text-decoration: none; color: black; background: var(--accent); padding: 12px; border-radius: 10px; font-weight: bold; display: block; margin: 10px 0; transition: 0.3s; }
    </style>
</head>
<body onclick="closeMenu()">

    <div id="splash-screen">
        <img src="images (1).jpg" id="logo1" class="logo-anim">
        <img src="logo saad.jpg" id="logo2" class="logo-anim">
    </div>

    <div id="login-screen" class="hidden" style="position:fixed; inset:0; background:black; z-index:9999; display:flex; justify-content:center; align-items:center;">
        <div class="popup-card">
            <h2 style="color:var(--accent)">Universe Login</h2>
            <input type="text" id="username" placeholder="Nama Panggilan" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:none; background:#222; color:white; box-sizing:border-box;">
            <input type="file" id="userphoto" style="margin-bottom:20px; font-size: 12px; color:white;">
            <button onclick="saveUser()" style="width:100%; padding:12px; background:var(--accent); border:none; border-radius:10px; font-weight:bold;">MASUK</button>
        </div>
    </div>

    <div id="lightbox" class="full-overlay" onclick="this.classList.remove('active')">
        <img id="lightbox-img" src="">
    </div>

    <div id="profile-popup" class="full-overlay" onclick="this.classList.remove('active')">
        <div class="popup-card" onclick="event.stopPropagation()">
            <img id="p-img" src="" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:2px solid var(--accent); margin-bottom:15px;">
            <h2 id="p-name" style="margin:0; color:var(--accent)"></h2>
            <p style="opacity:0.6; margin-bottom:20px;">8 Sa'ad Member</p>
            <button onclick="logout()" style="width:100%; padding:12px; border-radius:12px; background:none; border:1px solid #ff4d4d; color:#ff4d4d; font-weight:bold;">LOGOUT</button>
        </div>
    </div>

    <nav id="navbar" class="hidden">
        <h3 style="color:var(--accent); margin:0;">8 SA'AD</h3>
        <div style="display: flex; align-items: center; gap: 15px;">
            <img id="nav-profile-img" src="" onclick="showProfile(event)" style="width:42px; height:42px; border-radius:50%; object-fit:cover; border:1px solid var(--accent); cursor:pointer;">
            <div style="font-size:24px; cursor:pointer; color:var(--accent);" onclick="toggleMenu(event)">☰</div>
        </div>
    </nav>

    <div id="side-menu" class="side-menu">
        <button class="menu-item" onclick="showView('gallery')">🖼️ Galeri Memori</button>
        <button class="menu-item" onclick="showView('members')">👥 Anggota Kelas</button>
        <button class="menu-item" onclick="openUpload()">📤 Upload Foto</button>
        <div style="flex-grow: 1;"></div>
        <button class="menu-item" style="color: #ff4d4d;" onclick="logout()">🚪 Logout</button>
    </div>

    <div id="view-gallery" class="container hidden">
        <h1 style="color:var(--accent)">Gallery</h1>
        <div class="grid" id="gallery-grid"></div>
        <div class="social-box">
            <a href="https://instagram.com/saaduniverse_" target="_blank" class="social-btn">Instagram</a>
            <a href="https://open.spotify.com/playlist/22jlPh2YtYPYUL7AaDHY2K?si=08f0f2a780d44a8e" target="_blank" class="social-btn" style="background:#1DB954; color:white;">Spotify</a>
            <a href="https://drive.google.com/drive/folders/1-Jw5sYMFMrO7maAhHNGSCHF0XZjTvTzf?usp=sharing" target="_blank" class="social-btn" style="background:white; color:black;">GDrive</a>
        </div>
    </div>

    <div id="view-members" class="container hidden">
        <h1 style="color:var(--accent)">Members</h1>
        
        <div id="walas-container" style="max-width:200px; margin: 0 auto 40px;">
            <div class="member-card" id="wali-kelas" style="aspect-ratio: auto;">
                <div class="member-circle" onclick="openLightbox('anggota saad/missdina.saad.jpeg')">
                    <img src="anggota saad/missdina.saad.jpeg" onerror="this.src='https://via.placeholder.com/200?text=MD'">
                </div>
                <div style="color:var(--accent); font-weight:bold; font-size:12px;">WALI KELAS</div>
                <div style="font-weight:bold; font-size:1.2rem;">Miss Dina</div>
            </div>
        </div>

        <div class="grid" id="members-grid"></div>
    </div>

    <div id="upload-popup" class="full-overlay" onclick="this.classList.remove('active')">
        <div class="popup-card" onclick="event.stopPropagation()">
            <h3 style="color:var(--accent)">Upload Foto</h3>
            <input type="file" id="file-upload" accept="image/*" style="margin: 20px 0; color:white;">
            <button onclick="handleUpload()" style="width:100%; padding:12px; background:var(--accent); border:none; border-radius:12px; font-weight:bold;">UPLOAD</button>
        </div>
    </div>

    <script>
        const students = ["Abiyu", "Eilen", "Naura", "Rendra", "Risa", "Alvaro Yusuf", "Alvaro KM", "Adara", "Akram", "Andra", "Afkar", "Batis", "Fabian", "Haryo", "Haya", "Khanza", "Lulla", "Nadhira", "Naufal", "Nayla", "Queen", "Raisha"];

        window.onload = () => {
            const l1 = document.getElementById('logo1'), l2 = document.getElementById('logo2'), sp = document.getElementById('splash-screen');
            setTimeout(() => l1.classList.add('active'), 500);
            setTimeout(() => { l1.classList.remove('active'); l2.classList.add('active'); }, 2500);
            setTimeout(() => { sp.style.opacity = '0'; setTimeout(() => { sp.classList.add('hidden'); checkUser(); }, 1000); }, 4500);
        };

        function checkUser() {
            const user = localStorage.getItem('saad_user');
            if(user) showApp(JSON.parse(user));
            else document.getElementById('login-screen').classList.remove('hidden');
        }

        function saveUser() {
            const name = document.getElementById('username').value, photoInput = document.getElementById('userphoto').files[0];
            if(!name || !photoInput) return alert("Wajib isi data!");
            const r = new FileReader();
            r.onload = (e) => {
                const data = { name, photo: e.target.result };
                localStorage.setItem('saad_user', JSON.stringify(data));
                showApp(data);
            };
            r.readAsDataURL(photoInput);
        }

        function showApp(data) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('navbar').classList.remove('hidden');
            document.getElementById('nav-profile-img').src = data.photo;
            showView('gallery');
            loadGallery();
            loadMembers();
        }

        function createPhotoItem(src) {
            const div = document.createElement('div');
            div.className = 'card-item';
            div.innerHTML = `
                <img src="${src}" onclick="openLightbox('${src}')" onerror="this.parentElement.remove()">
                <div class="photo-actions">
                    <div class="btn-float" onclick="event.stopPropagation(); this.classList.toggle('active');"><i class="fas fa-heart"></i></div>
                    <a href="${src}" download class="btn-float" onclick="event.stopPropagation()"><i class="fas fa-download"></i></a>
                </div>
            `;
            return div;
        }

        function loadGallery() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';
            for(let i=1; i<=30; i++) grid.appendChild(createPhotoItem(`Saad Web/memory- (${i}).jpg`));
            startScrollAnimation();
        }

        function loadMembers() {
            const grid = document.getElementById('members-grid');
            grid.innerHTML = '';
            students.forEach(name => {
                const path = `anggota saad/${name.toLowerCase().replace(/\s/g, "")}.saad.jpeg`;
                const div = document.createElement('div');
                div.className = 'member-card';
                div.innerHTML = `
                    <div class="member-circle" onclick="openLightbox('${path}')">
                        <img src="${path}" onerror="this.src='https://via.placeholder.com/200?text=${name[0]}'">
                    </div>
                    <div style="font-weight:bold; font-size:0.9rem;">${name}</div>
                `;
                grid.appendChild(div);
            });
            document.getElementById('wali-kelas').classList.add('reveal');
            startScrollAnimation();
        }

        // ORIGINAL ANIMATION LOGIC
        function startScrollAnimation() {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach((en, i) => {
                    if (en.isIntersecting) setTimeout(() => en.target.classList.add('reveal'), (i % 4) * 100);
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.card-item, .member-card').forEach(el => obs.observe(el));
        }

        function showProfile(e) {
            e.stopPropagation();
            const u = JSON.parse(localStorage.getItem('saad_user'));
            document.getElementById('p-img').src = u.photo;
            document.getElementById('p-name').innerText = u.name;
            document.getElementById('profile-popup').classList.add('active');
        }

        function showView(v) {
            document.getElementById('view-gallery').classList.add('hidden');
            document.getElementById('view-members').classList.add('hidden');
            document.getElementById('view-' + v).classList.remove('hidden');
            closeMenu();
        }

        function handleUpload() {
            const file = document.getElementById('file-upload').files[0];
            if(!file) return;
            const url = URL.createObjectURL(file);
            const grid = document.getElementById('gallery-grid');
            const newItem = createPhotoItem(url);
            newItem.classList.add('reveal');
            grid.prepend(newItem);
            document.getElementById('upload-popup').classList.remove('active');
        }

        function toggleMenu(e) { e.stopPropagation(); document.getElementById('side-menu').classList.toggle('active'); }
        function closeMenu() { document.getElementById('side-menu').classList.remove('active'); }
        function openLightbox(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').classList.add('active'); }
        function openUpload() { document.getElementById('upload-popup').classList.add('active'); closeMenu(); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
